      # AWS EC2 서버에 SSH로 원격 접속하여 명령어 원격 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}         # EC2 인스턴스 IP
          username: ubuntu                      # OS 유저명
          key: ${{ secrets.EC2_SSH_KEY }}       # .pem 키 내용
          script: |
            cd /home/ubuntu/FOODKET-backend    # 백엔드 폴더 이동
            git pull origin main               # 최신 코드 가져오기
            source venv/bin/activate           # 가상환경 활성화
            
            # 🌟 패키지 자동 설치 명령 실행!
            pip install -r requirements.txt    
            
            # gunicorn 이나 uvicorn 서버 재시작
            sudo systemctl restart foodket-backend